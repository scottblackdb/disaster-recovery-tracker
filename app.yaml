command:
  - uvicorn
  - backend.main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: LLM_ENDPOINT
    value: "databricks-llama-4-maverick"
  - name: REFINE_LLM_ENDPOINT
    value: "databricks-gpt-oss-120b"
  - name: ENDPOINT_NAME
    value: "projects/disaster-recovery/branches/production/endpoints/primary"

resources:
  - name: disaster-recovery-lakebase
    type: postgres
    project: disaster-recovery
    branch: production
    endpoint: primary
